<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>I Love You ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
background:radial-gradient(circle at center,
#ff7aa8 0%,
#ff4f87 20%,
#b0003a 55%,
#420018 100%);
font-family:Arial,sans-serif;
}

.container{
position:relative;
z-index:2;
text-align:center;
}

h1{
color:#fff;
font-size:clamp(55px,10vw,120px);
font-weight:300;
text-shadow:
0 0 10px #fff,
0 0 20px #ff8ab5,
0 0 40px #ff4f87,
0 0 80px #ff2d55;
animation:pulse 2s infinite;
}

.small{
margin-top:20px;
font-size:50px;
color:white;
animation:beat 1.2s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.05);
}
}

@keyframes beat{
0%,100%{
transform:scale(1);
}
50%{
transform:scale(1.3);
}
}

.heart{
position:absolute;
bottom:-50px;
color:#ffd1e1;
animation:float linear forwards;
pointer-events:none;
}

@keyframes float{
0%{
transform:translateY(0) scale(0.5);
opacity:0;
}
20%{
opacity:1;
}
100%{
transform:translateY(-120vh) scale(1.2);
opacity:0;
}
}
</style>
</head>

<body>

<div class="container">
<h1>I LOVE YOU</h1>
<div class="small">❤️</div>
</div>

<script>

function createHeart(){

const heart=document.createElement("div");

heart.className="heart";

heart.innerHTML="❤";

heart.style.left=Math.random()*100+"vw";

heart.style.fontSize=(15+Math.random()*35)+"px";

heart.style.animationDuration=(4+Math.random()*4)+"s";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,180);

</script>

</body>
</html>
